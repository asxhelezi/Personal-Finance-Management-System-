<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Transaction | Personal Finance System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div id="mainNavContainer"></div>
  <div class="wrap">
    <div class="frame">

      <div class="hero mb-3">
        <div class="kicker">Transactions</div>
        <h1 class="page-title">Add a new transaction</h1>
        <p class="page-sub">Choose the type first so the category list shows matching options.</p>
      </div>

      <div class="section-card">
        <form id="transactionForm" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="transactionDate">Date</label>
              <input class="form-control" id="transactionDate" type="date" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="transactionType">Type</label>
              <select class="form-select" id="transactionType">
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="category">Category</label>
              <select class="form-select" id="category" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="status">Status</label>
              <select class="form-select" id="status">
                <option value="Completed">Completed</option>
                <option value="Pending">Pending</option>
                <option value="Verified">Verified</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label" for="description">Description</label>
              <input class="form-control" id="description" type="text" placeholder="e.g. Weekly groceries" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="amount">Amount</label>
              <input class="form-control" id="amount" type="number" min="0.01" step="0.01" required>
            </div>
          </div>
          <div class="actions-row mt-4">
            <a class="btn btn-outline" href="transactions.html">Cancel</a>
            <button class="btn btn-primary" type="submit">Save transaction</button>
          </div>
        </form>
        <div id="transactionMessage" class="mt-3"></div>
      </div>

      <div class="footer">© 2026 Personal Finance System</div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    $(function () {
      PFM.requireLogin();
      PFM.renderNav('transactions');
      $('#transactionDate').val(new Date().toISOString().split('T')[0]);
      PFM.fillCategoryOptions('#transactionType', '#category');
      $('#transactionType').on('change', function () {
        PFM.fillCategoryOptions('#transactionType', '#category');
      });

      $('#transactionForm').on('submit', async function (e) {
        e.preventDefault();
        if (!$('#category').val())           return PFM.showMessage('#transactionMessage', 'danger', 'Select a category.');
        if (!$('#description').val().trim()) return PFM.showMessage('#transactionMessage', 'danger', 'Enter a description.');
        if (Number($('#amount').val()) <= 0) return PFM.showMessage('#transactionMessage', 'danger', 'Amount must be greater than 0.');

        try {
          await $.ajax({
            url: PFM.API_BASE + '/transactions',
            method: 'POST', contentType: 'application/json',
            headers: PFM.getAuthHeaders(),
            data: JSON.stringify({
              date:        $('#transactionDate').val(),
              type:        $('#transactionType').val(),
              category:    $('#category').val(),
              description: $('#description').val().trim(),
              amount:      Number($('#amount').val()),
              status:      $('#status').val()
            })
          });
          PFM.showMessage('#transactionMessage', 'success', 'Transaction saved. Redirecting…');
          setTimeout(function () { window.location.href = 'transactions.html'; }, 900);
        } catch (xhr) {
          var msg = (xhr.responseJSON && xhr.responseJSON.error) || 'Save failed.';
          PFM.showMessage('#transactionMessage', 'danger', msg);
        }
      });
    });
  </script>
</body>
</html>
