<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Transaction | Personal Finance System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div id="mainNavContainer"></div>
  <div class="wrap">
    <div class="frame">

      <div class="hero mb-3">
        <div class="kicker">Transactions</div>
        <h1 class="page-title">Edit transaction</h1>
        <p class="page-sub">Update the details and keep the category aligned with the type.</p>
      </div>

      <div class="section-card">
        <form id="editTransactionForm" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="transactionDate">Date</label>
              <input class="form-control" id="transactionDate" type="date" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="transactionType">Type</label>
              <select class="form-select" id="transactionType">
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="category">Category</label>
              <select class="form-select" id="category" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="status">Status</label>
              <select class="form-select" id="status">
                <option value="Completed">Completed</option>
                <option value="Pending">Pending</option>
                <option value="Verified">Verified</option>
                <option value="Flagged">Flagged</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label" for="description">Description</label>
              <input class="form-control" id="description" type="text" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="amount">Amount</label>
              <input class="form-control" id="amount" type="number" min="0.01" step="0.01" required>
            </div>
          </div>
          <div class="actions-row mt-4">
            <a class="btn btn-outline" href="transactions.html">Cancel</a>
            <button class="btn btn-primary" type="submit">Update transaction</button>
          </div>
        </form>
        <div id="editMessage" class="mt-3"></div>
      </div>

      <div class="footer">© 2026 Personal Finance System</div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    $(function () {
      PFM.requireLogin();
      PFM.renderNav('transactions');
      var id          = PFM.queryId();
      var transaction = PFM.getTransactionById(id);
      if (!transaction) { PFM.showMessage('#editMessage', 'danger', 'Transaction not found.'); return; }

      $('#transactionDate').val(transaction.date);
      $('#transactionType').val(transaction.type);
      PFM.fillCategoryOptions('#transactionType', '#category', transaction.category);
      $('#status').val(transaction.status);
      $('#description').val(transaction.description);
      $('#amount').val(transaction.amount);

      $('#transactionType').on('change', function () {
        PFM.fillCategoryOptions('#transactionType', '#category');
      });

      $('#editTransactionForm').on('submit', function (e) {
        e.preventDefault();
        if (!$('#category').val()) return PFM.showMessage('#editMessage', 'danger', 'Select a category.');

        PFM.updateTransaction(id, {
          date:        $('#transactionDate').val(),
          type:        $('#transactionType').val(),
          category:    $('#category').val(),
          description: $('#description').val().trim(),
          amount:      Number($('#amount').val()),
          status:      $('#status').val()
        });

        PFM.showMessage('#editMessage', 'success', 'Transaction updated. Redirecting…');
        setTimeout(function () { window.location.href = 'transactions.html'; }, 900);
      });
    });
  </script>
</body>
</html>
