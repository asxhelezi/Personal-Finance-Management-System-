<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings | Personal Finance System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div id="mainNavContainer"></div>
  <div class="wrap">
    <div class="frame">

      <div class="hero mb-3">
        <div class="kicker">Savings</div>
        <h1 class="page-title">Manage your savings</h1>
        <p class="page-sub">Add to your total, or edit the stored values directly when needed.</p>
      </div>

      <div class="row g-3">

        <div class="col-xl-4">
          <div class="section-card h-100">
            <div class="section-title mb-3">Overview</div>
            <div class="stat-label">Current total</div>
            <div class="stat-value mb-3" id="currentSavings"></div>
            <div class="stat-label">Goal</div>
            <div class="stat-value mb-3" id="currentGoal"></div>
            <div class="progress"><div class="progress-bar" id="goalBar" style="width:0%"></div></div>
            <div class="text-muted mt-2" style="font-size:.85rem;" id="goalProgressText"></div>
          </div>
        </div>

        <div class="col-xl-4">
          <div class="section-card h-100">
            <div class="section-title mb-1">Add to savings</div>
            <div class="section-desc mb-3">Increments the total instead of replacing it.</div>
            <form id="addSavingsForm" novalidate>
              <div class="field">
                <label class="form-label" for="addSavingsAmount">Amount to add</label>
                <input class="form-control" id="addSavingsAmount" type="number" min="0.01" step="0.01" required>
              </div>
              <button class="btn btn-primary" type="submit">Add to savings</button>
            </form>
            <div id="addSavingsMessage" class="mt-3"></div>
          </div>
        </div>

        <div class="col-xl-4">
          <div class="section-card h-100">
            <div class="section-title mb-1">Edit totals directly</div>
            <div class="section-desc mb-3">Use this only to correct stored values.</div>
            <form id="editSavingsForm" novalidate>
              <div class="field">
                <label class="form-label" for="editSavingsTotal">Total savings</label>
                <input class="form-control" id="editSavingsTotal" type="number" min="0" step="0.01">
              </div>
              <div class="field">
                <label class="form-label" for="editSavingsGoal">Savings goal</label>
                <input class="form-control" id="editSavingsGoal" type="number" min="0" step="0.01">
              </div>
              <button class="btn btn-outline" type="submit">Save changes</button>
            </form>
            <div id="editSavingsMessage" class="mt-3"></div>
          </div>
        </div>

      </div>

      <div class="footer">© 2026 Personal Finance System</div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    $(async function () {
      PFM.requireLogin();
      PFM.renderNav('savings');

      var currency = 'EUR';

      function renderSavings(data) {
        $('#currentSavings').text(PFM.formatAmount(data.totalSavings || 0, currency));
        $('#currentGoal').text(PFM.formatAmount(data.savingsGoal || 0, currency));
        $('#goalBar').css('width', (data.progress || 0) + '%');
        $('#goalProgressText').text((data.progress || 0).toFixed(0) + '% of your goal reached.');
        $('#editSavingsTotal').val(data.totalSavings || 0);
        $('#editSavingsGoal').val(data.savingsGoal || 0);
      }

      try {
        var profile = await PFM.getProfile();
        currency = profile.currency || 'EUR';
        var goal = profile.savingsGoal || 0;
        var progress = goal <= 0 ? 0 : Math.min(100, Math.max(0, (profile.totalSavings / goal) * 100));
        renderSavings({ totalSavings: profile.totalSavings, savingsGoal: goal, progress: progress });
      } catch (xhr) {
        if (xhr.status === 401) { PFM.logout(); window.location.href = 'authentication.html'; }
      }

      $('#addSavingsForm').on('submit', async function (e) {
        e.preventDefault();
        var amount = Number($('#addSavingsAmount').val());
        if (amount <= 0) return PFM.showMessage('#addSavingsMessage', 'danger', 'Enter an amount greater than 0.');
        try {
          var res = await $.ajax({
            url: PFM.API_BASE + '/savings/add',
            method: 'PATCH', contentType: 'application/json',
            headers: PFM.getAuthHeaders(),
            data: JSON.stringify({ amount: amount })
          });
          $('#addSavingsAmount').val('');
          PFM.showMessage('#addSavingsMessage', 'success', 'Savings updated successfully.');
          renderSavings(res);
        } catch (xhr) {
          var msg = (xhr.responseJSON && xhr.responseJSON.error) || 'Update failed.';
          PFM.showMessage('#addSavingsMessage', 'danger', msg);
        }
      });

      $('#editSavingsForm').on('submit', async function (e) {
        e.preventDefault();
        try {
          var res = await $.ajax({
            url: PFM.API_BASE + '/savings/edit',
            method: 'PATCH', contentType: 'application/json',
            headers: PFM.getAuthHeaders(),
            data: JSON.stringify({
              totalSavings: Number($('#editSavingsTotal').val() || 0),
              savingsGoal:  Number($('#editSavingsGoal').val() || 0)
            })
          });
          PFM.showMessage('#editSavingsMessage', 'success', 'Values updated.');
          renderSavings(res);
        } catch (xhr) {
          var msg = (xhr.responseJSON && xhr.responseJSON.error) || 'Update failed.';
          PFM.showMessage('#editSavingsMessage', 'danger', msg);
        }
      });
    });
  </script>
</body>
</html>
