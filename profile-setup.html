<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Setup | Personal Finance System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="wrap">
    <div class="frame" style="max-width:700px;">

      <div class="hero mb-3">
        <div class="kicker">Profile setup</div>
        <h1 class="page-title">Finish your account</h1>
        <p class="page-sub">Add personal details and set your preferred currency and savings goal.</p>
      </div>

      <div class="section-card">
        <form id="profileSetupForm" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="fullName">Full name</label>
              <input class="form-control" id="fullName" type="text" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="username">Username</label>
              <input class="form-control" id="username" type="text" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" type="email" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="phone">Phone</label>
              <input class="form-control" id="phone" type="text" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="age">Age</label>
              <input class="form-control" id="age" type="number" min="1" max="120" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="occupation">Occupation</label>
              <input class="form-control" id="occupation" type="text" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="currency">Default currency</label>
              <select class="form-select" id="currency">
                <option value="EUR">EUR — Euro</option>
                <option value="USD">USD — US Dollar</option>
                <option value="LEK">LEK — Albanian Lek</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="savingsGoal">Savings goal</label>
              <input class="form-control" id="savingsGoal" type="number" min="0" step="0.01" value="0">
            </div>
          </div>
          <div class="mt-4">
            <button class="btn btn-primary" type="submit">Save and open dashboard</button>
          </div>
        </form>
        <div id="setupMessage" class="mt-3"></div>
      </div>

      <div class="footer">© 2026 Personal Finance System</div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    $(async function () {
      PFM.requireLogin();

      var currentUser = PFM.getCurrentUser();
      $('#email').val(currentUser ? currentUser.email : '');
      $('#fullName').val(currentUser ? currentUser.fullName : '');
      $('#username').val(currentUser ? currentUser.username : '');

      try {
        var profile = await PFM.getProfile();
        if (profile.phone) $('#phone').val(profile.phone);
        if (profile.age)   $('#age').val(profile.age);
        if (profile.occupation) $('#occupation').val(profile.occupation);
        $('#currency').val(profile.currency || 'EUR');
        $('#savingsGoal').val(profile.savingsGoal || 0);
      } catch (e) { /* new user — profile doesn't exist yet */ }

      $('#profileSetupForm').on('submit', async function (e) {
        e.preventDefault();
        var rules    = PFM.getValidationMessages();
        var username = $('#username').val().trim();
        if (!$('#fullName').val().trim()) return PFM.showMessage('#setupMessage', 'danger', 'Full name is required.');
        if (!PFM.validateUsername(username)) return PFM.showMessage('#setupMessage', 'danger', rules.username);
        if (!$('#phone').val().trim())    return PFM.showMessage('#setupMessage', 'danger', 'Phone is required.');

        try {
          await $.ajax({
            url: PFM.API_BASE + '/profile',
            method: 'PUT', contentType: 'application/json',
            headers: PFM.getAuthHeaders(),
            data: JSON.stringify({
              fullName:     $('#fullName').val().trim(),
              username:     username,
              phone:        $('#phone').val().trim(),
              age:          $('#age').val() ? parseInt($('#age').val()) : null,
              occupation:   $('#occupation').val().trim(),
              currency:     $('#currency').val(),
              savingsGoal:  Number($('#savingsGoal').val() || 0),
              totalSavings: 0
            })
          });
          window.location.href = 'dashboard.html';
        } catch (xhr) {
          var msg = (xhr.responseJSON && xhr.responseJSON.error) || 'Setup failed.';
          PFM.showMessage('#setupMessage', 'danger', msg);
        }
      });
    });
  </script>
</body>
</html>
